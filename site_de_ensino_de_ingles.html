<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnglishFast - Plataforma Completa</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6fb}
header{background:#1e3a8a;color:#fff;text-align:center;padding:50px}
section{padding:30px}
.card{background:#fff;padding:20px;border-radius:10px;margin:10px;box-shadow:0 5px 15px rgba(0,0,0,.1)}
button{width:100%;padding:10px;background:#1e3a8a;color:#fff;border:none;border-radius:5px;margin-top:10px}
input,select{width:100%;padding:10px;margin:10px 0}
iframe{width:100%;height:200px;border-radius:10px;margin-top:10px}
.hidden{display:none}
</style>
</head>
<body>

<header>
<h1>EnglishFast</h1>
<p>Plataforma Profissional</p>
</header>

<section>
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<button onclick="registrar()">Criar Conta</button>
</section>

<section id="admin" class="hidden">
<h2>PAINEL ADMIN</h2>
<select id="nivel">
<option value="basico">Básico</option>
<option value="medio">Intermediário</option>
<option value="avancado">Avançado</option>
</select>
<input id="titulo" placeholder="Título da aula">
<input id="video" placeholder="Link do YouTube">
<button onclick="salvarAula()">Salvar Aula</button>

<h3>Aulas cadastradas</h3>
<div id="listaAulas"></div>
</section>

<section id="dashboard" class="hidden">
<h2>Área do Aluno</h2>
<div id="conteudo"></div>
</section>

<script>

const firebaseConfig = {
 apiKey:"SUA_API_KEY",
 authDomain:"SEU_DOMINIO",
 projectId:"SEU_ID"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

function registrar(){
 auth.createUserWithEmailAndPassword(email(),senha())
 .then(()=>alert('Conta criada'))
 .catch(e=>alert(e.message));
}

function login(){
 auth.signInWithEmailAndPassword(email(),senha())
 .then(()=>{
 if(email()==='admin@admin.com'){
  document.getElementById('admin').classList.remove('hidden');
  carregarAulas();
 }else{
  document.getElementById('dashboard').classList.remove('hidden');
  carregarConteudoPorPlano();
 }
 })
 .catch(e=>alert(e.message));
}

function email(){return document.getElementById('email').value}
function senha(){return document.getElementById('senha').value}

// ADMIN
function salvarAula(){
 db.collection('aulas').add({
  nivel:document.getElementById('nivel').value,
  titulo:document.getElementById('titulo').value,
  video:document.getElementById('video').value
 }).then(()=>{
  alert('Aula salva');
  carregarAulas();
 });
}

function carregarAulas(){
 let div=document.getElementById('listaAulas');
 div.innerHTML='';
 db.collection('aulas').get().then(snapshot=>{
  snapshot.forEach(doc=>{
   let d=doc.data();
   div.innerHTML+=`<div class="card"><b>${d.titulo}</b><p>${d.nivel}</p></div>`;
  });
 });
}

// 🔥 LIBERA CONTEÚDO POR PLANO
function carregarConteudoPorPlano(){
 let userEmail=email();
 let div=document.getElementById('conteudo');
 div.innerHTML='';

 db.collection('usuarios').doc(userEmail).get().then(doc=>{
  if(!doc.exists || !doc.data().ativo){
    alert('Você não tem acesso ainda');
    return;
  }

  let plano=doc.data().plano;

  db.collection('aulas').get().then(snapshot=>{
    snapshot.forEach(doc=>{
      let d=doc.data();

      // regras de liberação
      if(
        plano==='basico' && d.nivel==='basico' ||
        plano==='medio' && (d.nivel==='basico' || d.nivel==='medio') ||
        plano==='avancado'
      ){
        div.innerHTML+=`<div class="card">
        <h4>${d.titulo}</h4>
        <iframe src="${d.video}"></iframe>
        </div>`;
      }
    });
  });
 });
}

</script>

</body>
</html>
